<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>Cinematic Shadows | News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .news-section {
            padding: 160px 5% 100px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .news-grid {
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }

        .news-article {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.6s ease;
        }

        .news-article:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .news-image {
            height: 100%;
            min-height: 400px;
            background-size: cover;
            background-position: center;
            filter: grayscale(80%) brightness(0.6);
            transition: filter 0.8s ease;
        }

        .news-article:hover .news-image {
            filter: grayscale(0%) brightness(0.9);
        }

        .news-content {
            padding: 4rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .news-date {
            font-size: 0.85rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .news-title {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        .news-desc {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .news-btn {
            align-self: flex-start;
            padding: 0.8rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: var(--white);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 6px;
            transition: var(--transition-smooth);
        }

        .news-article:hover .news-btn {
            border-color: var(--accent);
            background: var(--accent);
        }

        @media (max-width: 900px) {
            .news-article {
                grid-template-columns: 1fr;
            }
            .news-image {
                min-height: 250px;
            }
            .news-content {
                padding: 2.5rem 1.5rem;
            }
        }
    </style>
</head>

<body class="dark-mode">
    <div id="preloader"><div class="loader-text">LOADING...</div></div>
    <div class="cursor"><span class="cursor-label"></span></div>
    <div class="cursor-follower"></div>

    <header>
        <nav>
            <a href="index.html" class="logo" data-lang-key="site_logo">CINEMATIC SHADOWS</a>
            <ul class="nav-links">
                <li><a href="index.html" data-lang-key="nav_home">Головна</a></li>
                <li><a href="archive.html" data-lang-key="nav_archive">Архів</a></li>
                <li><a href="news.html" data-lang-key="nav_news" style="color: var(--accent);">Новини</a></li>
                <li><a href="credits.html" data-lang-key="nav_credits">Творці</a></li>
            </ul>
            <div class="lang-switcher">
                <button id="lang-toggle" class="btn-lang">ENG</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="news-section">
            <h2 class="section-title reveal">
                <span class="white" data-lang-key="archive_title_white">ОСТАННІ</span> <span class="red"
                    data-lang-key="nav_news">НОВИНИ</span>
            </h2>
            <div id="news-grid" class="news-grid">
                <!-- Articles will be rendered dynamically by script.js -->
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 <span class="red">Cinematic Shadows</span>. <span data-lang-key="footer_rights">Всі права
                    захищено.</span></p>
        </div>
    </footer>

    <script src="js/script.js" type="module"></script>
</body>

</html>
