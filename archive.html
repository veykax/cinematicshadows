<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>Cinematic Shadows | Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="dark-mode">
    <div id="preloader"><div class="loader-text">LOADING...</div></div>
    <div class="cursor"><span class="cursor-label"></span></div>
    <div class="cursor-follower"></div>

    <header>
        <nav>
            <a href="index.html" class="logo" data-lang-key="site_logo">CINEMATIC SHADOWS</a>
            <ul class="nav-links">
                <li><a href="index.html" data-lang-key="nav_home">Головна</a></li>
                <li><a href="archive.html" data-lang-key="nav_archive">Архів</a></li>
                <li><a href="news.html" data-lang-key="nav_news">Новини</a></li>
                <li><a href="credits.html" data-lang-key="nav_credits">Творці</a></li>
            </ul>
            <div class="lang-switcher">
                <button id="lang-toggle" class="btn-lang">ENG</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="archive-section">
            <h2 class="section-title reveal">
                <span class="white" data-lang-key="archive_title_white">ІГРОВИЙ</span> <span class="red"
                    data-lang-key="archive_title_red">АРХІВ</span>
            </h2>

            <div class="search-container reveal" style="max-width: 600px; margin: 0 auto 4rem; position: relative;">
                <input type="text" id="game-search" placeholder="Search games..." style="width: 100%; padding: 1rem 1.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); color: var(--white); font-size: 1.1rem; outline: none; transition: border-color 0.3s ease;">
            </div>

            <div id="games-grid" class="games-grid">
                <!-- Cards will be rendered dynamically by script.js -->
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 <span class="red">Cinematic Shadows</span>. <span data-lang-key="footer_rights">Всі права
                    захищено.</span></p>
        </div>
    </footer>

    <script src="js/script.js" type="module"></script>
</body>

</html>
