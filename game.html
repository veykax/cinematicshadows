<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>Cinematic Shadows | Game Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .game-detail-hero {
            height: 70vh;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 0 5% 5rem;
            background-size: cover;
            background-position: center;
        }

        .game-detail-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--bg-main));
        }

        .hero-content-inner {
            position: relative;
            z-index: 2;
            max-width: 800px;
        }

        .game-page-title {
            font-size: clamp(3rem, 8vw, 5rem);
            margin-bottom: 0.5rem;
            letter-spacing: 5px;
        }

        .game-page-subtitle {
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 2rem;
        }

        .game-info-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 5rem;
            padding: 5rem 5%;
        }

        .info-block h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            border-left: 4px solid var(--accent);
            padding-left: 1.5rem;
            letter-spacing: 2px;
        }

        .info-text {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .features-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .feature-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }

        .meta-list {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .meta-item {
            margin-bottom: 2rem;
        }

        .meta-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .meta-value {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--white);
        }

        @media (max-width: 900px) {
            .game-info-grid {
                grid-template-columns: 1fr;
                gap: 3rem;
            }
        }
    </style>
</head>

<body class="dark-mode">
    <div id="preloader"><div class="loader-text">LOADING...</div></div>
    <div class="cursor"><span class="cursor-label"></span></div>
    <div class="cursor-follower"></div>

    <header>
        <nav>
            <a href="index.html" class="logo" data-lang-key="site_logo">CINEMATIC SHADOWS</a>
            <ul class="nav-links">
                <li><a href="index.html" data-lang-key="nav_home">Головна</a></li>
                <li><a href="archive.html" data-lang-key="nav_archive">Архів</a></li>
                <li><a href="news.html" data-lang-key="nav_news">Новини</a></li>
                <li><a href="credits.html" data-lang-key="nav_credits">Творці</a></li>
            </ul>
            <div class="lang-switcher">
                <button id="lang-toggle" class="btn-lang">ENG</button>
            </div>
        </nav>
    </header>

    <main id="game-page-content">
        <!-- Dynamic Content -->
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 <span class="red">Cinematic Shadows</span>. <span data-lang-key="footer_rights">Всі права
                    захищено.</span></p>
        </div>
    </footer>

    <script src="js/script.js" type="module"></script>
</body>

</html>
