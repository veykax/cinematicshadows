<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>Cinematic Shadows | Article</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .article-hero {
            height: 60vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: flex-end;
            position: relative;
            view-transition-name: active-news-hero;
        }

        .article-hero::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg-main) 10%, transparent 80%);
        }

        .article-hero-content {
            position: relative;
            z-index: 2;
            padding: 0 5% 4rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .article-date {
            font-size: 1rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .article-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin-bottom: 1rem;
            text-shadow: 0 5px 20px rgba(0,0,0,0.8);
            line-height: 1.1;
        }

        .article-body {
            max-width: 800px;
            margin: 4rem auto 10rem;
            padding: 0 5%;
            font-size: 1.2rem;
            line-height: 1.9;
            color: var(--text-main);
        }

        .article-body p {
            margin-bottom: 2rem;
        }

        .article-body h3 {
            margin: 3rem 0 1.5rem;
            font-size: 1.8rem;
            color: var(--white);
        }
    </style>
</head>

<body class="dark-mode">
    <div id="preloader"><div class="loader-text">LOADING...</div></div>
    <div class="cursor"><span class="cursor-label"></span></div>
    <div class="cursor-follower"></div>

    <header>
        <nav>
            <a href="index.html" class="logo" data-lang-key="site_logo">CINEMATIC SHADOWS</a>
            <ul class="nav-links">
                <li><a href="index.html" data-lang-key="nav_home">Головна</a></li>
                <li><a href="archive.html" data-lang-key="nav_archive">Архів</a></li>
                <li><a href="news.html" data-lang-key="nav_news">Новини</a></li>
                <li><a href="credits.html" data-lang-key="nav_credits">Творці</a></li>
            </ul>
            <div class="lang-switcher">
                <button id="lang-toggle" class="btn-lang">ENG</button>
            </div>
        </nav>
    </header>

    <main id="article-page-content">
        <!-- Injected via JS -->
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 <span class="red">Cinematic Shadows</span>. <span data-lang-key="footer_rights">Всі права
                    захищено.</span></p>
        </div>
    </footer>

    <script src="js/script.js" type="module"></script>
</body>

</html>
